<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Apri Ticket</title>
</head>
<body style="font-family: Arial; padding: 20px;">
<h2>Apri Ticket</h2>

<input type="text" id="ticket" placeholder="Inserisci ticket..." style="width: 250px; font-size: 16px;">
<button onclick="openTicket()" style="font-size: 16px;">Apri</button>

<script>
function openTicket() {
    let t = document.getElementById("ticket").value.trim().toUpperCase();
    if (!t) return;

    let url;

    if (t.startsWith("INC")) {
        url = "https://enel.service-now.com/nav_to.do?uri=%2Ftext_search_exact_match.do?sysparm_search=" + t;
    } else if (t.startsWith("RITM")) {
        url = "https://enel.service-now.com/nav_to.do?uri=%2Ftext_search_exact_match.do?sysparm_search=" + t;
    } else if (t.startsWith("FDQ")) {
        url = "https://sd.springlab.enel.com/plugins/servlet/desk/portal/30/" + t;
    } else {
        url = "https://jira.springlab.enel.com/browse/" + t;
    }

    // Apri nella stessa scheda
    location.href = url;
}
</script>

</body>
</html>
