<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dispatcher Ticket</title>
</head>
<body>

<script>
// Ottieni i parametri della query string
const params = new URLSearchParams(window.location.search);
let t = params.get("tk");         // es: ?tk=INC12345

if (!t) {
    document.body.innerHTML = "<h2>Nessun ticket specificato.</h2>";
} else {
    t = t.trim().toUpperCase();
    let url;

    if (t.startsWith("INC")) {
        url = "https://enel.service-now.com/nav_to.do?uri=%2Ftext_search_exact_match.do?sysparm_search=" + t;
    } else if (t.startsWith("RITM")) {
        url = "https://enel.service-now.com/nav_to.do?uri=%2Ftext_search_exact_match.do?sysparm_search=" + t;
    } else if (t.startsWith("REQ")) {
        url = "https://enel.service-now.com/nav_to.do?uri=%2Ftext_search_exact_match.do?sysparm_search=" + t;
    } else if (t.startsWith("TASK")) {
        url = "https://enel.service-now.com/nav_to.do?uri=%2Ftext_search_exact_match.do?sysparm_search=" + t;
    } else if (t.startsWith("FDQ")) {
        url = "https://sd.springlab.enel.com/plugins/servlet/desk/portal/30/" + t;
    } else if (t.startsWith("INAECO")) {
        url = "https://jira.springlab.enel.com/browse/" + t;
    } else {
        url = "https://jira.springlab.enel.com/browse/" + t;
    }

    // Redirect immediato
    location.href = url;
}
</script>

</body>
</html>
