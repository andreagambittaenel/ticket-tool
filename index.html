<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dispatcher Ticket</title>
</head>
<body>

<script>
// Ottieni i parametri della query string
const params = new URLSearchParams(window.location.search);
let t = params.get("tk");         // es: ?tk=INC12345

if (!t) {
    document.body.innerHTML = "<h2>Nessun ticket specificato.</h2>";
} else {
    t = t.trim().toUpperCase();
    let url;

    if (t.startsWith("INC")) {
        url = "https://URL_PER_INC/" + t;
    } else if (t.startsWith("RITM")) {
        url = "https://URL_PER_RITM/" + t;
    } else if (t.startsWith("FDQ")) {
        url = "https://URL_PER_FDQ/" + t;
    } else {
        url = "https://URL_PER_ALTRI/" + t;
    }

    // Redirect immediato
    location.href = url;
}
</script>

</body>
</html>
